name: X Social Listening Scrape

on:
  workflow_dispatch:  # manual trigger only — runs when you click "Trigger refresh"

permissions:
  contents: write  # needed so the workflow can commit data.json back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWEETS_PER_KEYWORD: '40'
          LOOKBACK_HOURS: '24'
        run: python scrape.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --quiet --staged; then
            echo "No changes to commit"
          else
            git commit -m "Daily scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
